# Deploy the API to Render: https://render.com/docs/infrastructure-as-code
# Dashboard → New → Blueprint → connect this repo.
# Pair with Vercel for the frontend (see README).

services:
  - type: web
    name: notion-task-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./workmanager.db
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: AUTO_SEED
        value: "true"
